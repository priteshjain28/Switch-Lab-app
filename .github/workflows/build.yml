name: Build SwitchLab APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Android project and embed the HTML
        run: |
          set -e
          echo "::group::Locate HTML"
          html=$(find . -iname "switchlab.html" -not -path "./.git/*" | head -n1)
          if [ -z "$html" ]; then html=$(find . -iname "*.html" -not -path "./.git/*" | head -n1); fi
          if [ -z "$html" ]; then echo "ERROR: no .html file found in the repo. Upload your SwitchLab HTML file."; exit 1; fi
          echo "Using HTML: $html"
          echo "::endgroup::"
          set -e
          mkdir -p app/src/main/java/com/offerverse/switchlab
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SwitchLab"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
              id("org.jetbrains.kotlin.android") version "2.0.21" apply false
          }
          EOF

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          org.gradle.caching=true
          android.useAndroidX=true
          kotlin.code.style=official
          EOF

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.offerverse.switchlab"
              compileSdk = 35
              defaultConfig {
                  applicationId = "com.offerverse.switchlab"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0.0"
              }
              buildTypes {
                  release { isMinifyEnabled = false }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies { }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden|smallestScreenSize|screenLayout|uiMode|density">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/offerverse/switchlab/MainActivity.kt <<'EOF'
          package com.offerverse.switchlab

          import android.annotation.SuppressLint
          import android.app.Activity
          import android.os.Bundle
          import android.webkit.WebView
          import android.webkit.WebViewClient

          class MainActivity : Activity() {
              private lateinit var webView: WebView

              @SuppressLint("SetJavaScriptEnabled")
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  webView = WebView(this)
                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      databaseEnabled = true
                      loadWithOverviewMode = true
                      useWideViewPort = true
                      allowFileAccess = true
                      textZoom = 100
                  }
                  webView.webViewClient = WebViewClient()
                  setContentView(webView)
                  if (savedInstanceState == null) {
                      webView.loadUrl("file:///android_asset/index.html")
                  }
              }

              override fun onBackPressed() {
                  if (webView.canGoBack()) webView.goBack() else super.onBackPressed()
              }

              override fun onSaveInstanceState(outState: Bundle) {
                  super.onSaveInstanceState(outState)
                  webView.saveState(outState)
              }

              override fun onRestoreInstanceState(savedInstanceState: Bundle) {
                  super.onRestoreInstanceState(savedInstanceState)
                  webView.restoreState(savedInstanceState)
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">SwitchLab</string>
          </resources>
          EOF

          cat > app/src/main/res/values/colors.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="window_bg">#EEF3FF</color>
              <color name="status_bar">#EEF3FF</color>
              <color name="ic_bg">#4F46E5</color>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">@color/window_bg</item>
                  <item name="android:statusBarColor">@color/status_bar</item>
                  <item name="android:windowLightStatusBar">true</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_background.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#4F46E5" android:pathData="M0,0h108v108h-108z" />
          </vector>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <group android:scaleX="0.62" android:scaleY="0.62" android:pivotX="54" android:pivotY="54">
                  <path android:strokeColor="#FFFFFF" android:strokeWidth="7"
                      android:strokeLineCap="round" android:strokeLineJoin="round" android:fillColor="#00000000"
                      android:pathData="M34,42 L34,74 M34,42 L74,42 M34,58 L64,58 M74,34 L74,66 M74,66 L34,66" />
              </group>
          </vector>
          EOF
          echo "generation complete"
          cp "$html" app/src/main/assets/index.html
          echo "::group::Final tree"
          find . -path ./.git -prune -o -type f -print | sort
          echo "::endgroup::"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk SwitchLab.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SwitchLab-debug-apk
          path: SwitchLab.apk
          if-no-files-found: error
