# JVM settings for the Gradle daemon.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Build project modules in parallel where possible.
org.gradle.parallel=true

# Cache task outputs so repeat builds are faster.
org.gradle.caching=true

# REQUIRED: this project uses AndroidX (Jetpack Compose, activity-compose, etc.).
# Without this flag the build fails with:
#   "This project uses AndroidX dependencies, but the 'android.useAndroidX'
#    property is not enabled."
android.useAndroidX=true

# We do not depend on any legacy com.android.support libraries, so no Jetifier.
android.enableJetifier=false

# Kotlin official code style.
kotlin.code.style=official

# Faster, smaller R classes (each module gets only its own resources).
android.nonTransitiveRClass=true
